<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big CDG Smoke</title>

    <style>
        body {
            background-image: url('cenario.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
        }
        #b_n {
            display: flex;
            width: 400px;
            margin: 600px auto 0 auto;

        }

        #com {
            display: flex;
            width: 200px;
            margin: 50px auto;
            cursor: pointer;
        }

        figcaption {
            text-align: center;
            font-family: fantasy;
            font-size: 1.5em;
        }

        #video-container {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        #meuBotao {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <figure>
        <img id="b_n" src="b_n.png" alt="Big CDG Smoke zero zero five">
        <figcaption>Big CDG Smoke zero zero five</figcaption>
    </figure>

    <img id="com" src="com.png" alt="Comida">

    <button id="meuBotao">Botão gostoso</button>

    <div id="video-container">
        <video id="meu-video" width="640" height="360" controls>
            <source src="video-gostoso.mp4" type="video/mp4">
            Seu navegador não suporta vídeos em mp4.
        </video>
    </div>

    <script src="script.js"></script>
</body>
</html>
