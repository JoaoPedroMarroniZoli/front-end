<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Escolar</title>

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: solid 2px black;
            border-radius: 10px;
            background-color: white;
            text-align: center;
        }

        input {
            width: 300px;
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Média Escolar</h1>

        <input type="text" id="nome" placeholder="Nome do aluno">

        <input type="number" id="nota1" placeholder="Nota 1">

        <input type="number" id="nota2" placeholder="Nota 2">

        <input type="number" id="nota3" placeholder="Nota 3">

        <br>

        <button id="calcular">
            Calcular Média
        </button>

        <p id="resultado"></p>

    </div>

    <script src="escola.js">
    </script>

</body>
</html>
