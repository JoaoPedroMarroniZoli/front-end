<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Dinâmico</title>

    <style>
        div {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: solid 2px black;
            padding: 10px;
            margin: 0 auto;
        }
        .container {
            padding: 30px;
            width: 400px;

        }
        h1 {
            text-align: center;
        }
        input {
            width: 300px;
        }
        
    </style>
</head>
<body>
    <div class="container">

        <h1>Conversor de Temperatura</h1>

        <div>
            <label>Celsius (°C)</label>
            <br>
            <input type="number" id="celsius" step="0.1">
        </div>

        <div>
            <label>Fahrenheit (°F)</label>
            <br>
            <input type="number" id="fahrenheit" step="0.1">
        </div>

    </div>


    <script src="conv.js"></script>
</body>
</html>
