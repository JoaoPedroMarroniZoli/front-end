<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Bank</title>

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: solid 2px black;
            border-radius: 10px;
            background-color: white;
            text-align: center;
        }

        input, select {
            width: 300px;
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Infinity Bank</h1>

        <select id="bandeira">

            <option value="">Selecione a bandeira</option>

            <option value="visa">Visa</option>

            <option value="master">Master</option>

            <option value="elo">Elo</option>

        </select>

        <br>

        <input
            type="number"
            id="valor"
            placeholder="Valor da venda"
        >

        <br>

        <input
            type="number"
            id="parcelas"
            placeholder="Quantidade de parcelas"
        >

        <br>

        <button id="calcular">
            Calcular
        </button>

        <div id="resultado"></div>

    </div>

    <script src="taxas.js"></script>

</body>
</html>
